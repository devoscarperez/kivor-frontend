<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KIVOR</title>
    <link rel="stylesheet" href="css/login-v2.css">
</head>
<body>

    <div class="kivor-container">

        <!-- Marca -->
        <div class="kivor-brand">
            KIVOR
        </div>

        <!-- Mensaje -->
        <div class="kivor-message">
            Acceso a tu operación
        </div>

        <!-- Input -->
        <div class="kivor-input-container">

            <label class="kivor-label">Usuario</label>

            <input 
                type="text" 
                id="kivor-input"
                class="kivor-input"
                autocomplete="off"
            >

            <div class="kivor-error" id="kivor-error"></div>

        </div>

        <!-- Botón -->
        <button class="kivor-button" id="kivor-button">
            Siguiente
        </button>

    </div>

    <script src="js/login-v2.js"></script>

</body>
</html>
