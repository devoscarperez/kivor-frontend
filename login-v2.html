<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVOR</title>

    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/login-v2.css">
</head>
<body data-theme="dark">
<div id="login-texture">
    <div class="kivor-world">
        <div class="kivor-device">
            <div class="kivor-frame">
                <div class="kivor-screen">
                    <div class="kivor-container">
                        <div class="kivor-content-box">
                            <div class="kivor-message">Acceso a tu operación</div>

                            <div class="kivor-input-container">
                                <label class="kivor-label" for="kivor-input">Usuario</label>
                                <input
                                    type="text"
                                    id="kivor-input"
                                    class="kivor-input"
                                    autocomplete="off"
                                    autofocus
                                >
                                <div class="kivor-error" id="kivor-error"></div>
                            </div>

                            <button class="kivor-button" id="kivor-button">
                                Siguiente
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <img src="/assets/images/logo-kivor.svg" alt="KIVOR" class="kivor-logo">
        </div>
    </div>


    
</div>    
    <script src="/js/login-v2.js"></script>
    <script src="https://unpkg.com/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- <script src="/js/crt-init.js"></script> -->
</body>
</html>
