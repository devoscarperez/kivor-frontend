<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KIVOR - Carga de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ventas-lyl.css">
</head>

<body>
    <main class="ventas-page">
        <section class="ventas-card">
            <header class="ventas-header">
                <div>
                    <h1>Carga de Ventas</h1>
                    <p>Importa ventas desde Excel hacia la tabla staging.</p>
                </div>
            </header>

            <section class="ventas-warning">
                <strong>Importante:</strong>
                al confirmar la carga, KIVOR eliminará primero los registros existentes
                del año y mes seleccionados en staging, y luego insertará los datos del Excel.
            </section>

            <form id="ventasUploadForm" class="ventas-form">
                <div class="ventas-grid">
                    <div class="ventas-field">
                        <label for="anio">Año</label>
                        <select id="anio" name="anio" required></select>
                    </div>

                    <div class="ventas-field">
                        <label for="mes">Mes</label>
                        <select id="mes" name="mes" required>
                            <option value="">Seleccione</option>
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3">Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                            <option value="11">Noviembre</option>
                            <option value="12">Diciembre</option>
                        </select>
                    </div>
                </div>

                <div class="ventas-field">
                    <label for="archivoVentas">Archivo Excel</label>
                    <input
                        id="archivoVentas"
                        name="archivoVentas"
                        type="file"
                        accept=".xlsx,.xls"
                        required
                    >
                </div>

                <div id="selectedFileBox" class="ventas-file-box hidden"></div>

                <div class="ventas-actions">
                    <button type="submit" id="btnCargarVentas">
                        Cargar ventas
                    </button>
                </div>
            </form>

            <section id="ventasResult" class="ventas-result hidden"></section>
        </section>
    </main>

    <div id="confirmModal" class="ventas-modal hidden">
        <div class="ventas-modal-content">
            <h2>Confirmar carga</h2>
            <p id="confirmText"></p>

            <div class="ventas-modal-actions">
                <button id="btnCancelConfirm" type="button">
                    Cancelar
                </button>

                <button id="btnConfirmUpload" type="button" class="danger">
                    Confirmar carga
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ventas-lyl-carga.js"></script>
</body>
</html>
