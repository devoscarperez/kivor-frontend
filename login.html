<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVOR Login</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="layout">

    <!-- MARCA KIVOR -->
    <div class="brand">
        <h1>KIVOR</h1>
        <p id="brand-tagline"></p>
    </div>

    <!-- LOGIN -->
    <div class="container">

        <!-- PANTALLA USUARIO -->
        <div id="screen-username" class="screen active">
            <label id="label-username"></label>
            <input type="text" id="username" autocomplete="off" />
            <p class="input-error" id="username-error"></p>
            <button id="btn-username"></button>
        </div>

        <!-- PANTALLA PASSWORD -->
        <div id="screen-password" class="screen">
            <p class="user-display" id="display-username"></p>
            <label id="label-password"></label>
            <input type="password" id="password" />
            <p class="input-error" id="password-error"></p>

            <div class="buttons">
                <button id="btn-back"></button>
                <button id="btn-login"></button>
            </div>
        </div>

    </div>

</div>

<script src="js/i18n.js"></script>
<script src="js/login.js"></script>
</body>
</html>
