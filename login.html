<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="layout">

    <!-- MARCA KIVOR -->
    <!--
    <div class="brand">
        <h1>KIVOR</h1>
        <p id="brand-tagline"></p>
    </div>
    -->
    <div class="brand">
        <img src="assets/images/logo-kivor.svg" alt="KIVOR" class="brand-logo">
        <p id="brand-tagline"></p>
    </div>
    <!-- LOGIN -->
    <div class="container">

        <!-- PANTALLA USUARIO -->
        <div id="screen-username" class="screen active">
            <div class="input-group">
                <input type="text" id="username" autocomplete="off" placeholder=" " />
                <label id="label-username"></label>
                <p class="input-error" id="username-error"></p>
            </div>
            <button id="btn-username"></button>
        </div>

        <!-- PANTALLA PASSWORD -->
        <div id="screen-password" class="screen">
            <p class="user-display" id="display-username"></p>
           <label id="label-password"></label>

            <div class="password-wrapper">
                <input type="password" id="password" />
                <button type="button" id="toggle-password" class="toggle-password">
                    👁
                </button>
            </div>
            <p class="input-error" id="password-error"></p>
            <div class="buttons">
                <button id="btn-back"></button>
                <button id="btn-login"></button>
            </div>
        </div>

    </div>

</div>
<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
