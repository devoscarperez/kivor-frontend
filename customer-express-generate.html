<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generar formulario cliente</title>

<link rel="stylesheet" href="css/login.css">

<style>

.result-box{
    margin-top:16px;
    padding:12px;
    background:#f3f4f6;
    border-radius:10px;
    font-size:14px;
    word-break:break-all;
}

.copy-btn{
    margin-top:10px;
    background:#111;
}

.message{
    margin-top:10px;
    font-size:13px;
    color:#166534;
    display:none;
}

</style>

</head>

<body>

<div class="layout">

<div class="container">

<h2 style="margin-bottom:10px;">Generar registro cliente</h2>

<p style="font-size:14px;color:#555;margin-bottom:20px;">
Genera un enlace para que la clienta complete su registro.
</p>

<button id="btn-generate">
Generar enlace
</button>

<div id="result" class="result-box" style="display:none;"></div>

<button id="btn-copy" class="copy-btn" style="display:none;">
Copiar enlace
</button>

<div id="message" class="message">
Enlace copiado al portapapeles
</div>
<hr style="margin:30px 0;">

<h3 style="margin-bottom:10px;">Consultar cliente por celular</h3>

<input
id="search-mobile"
type="text"
placeholder="Celular cliente"
/>

<button id="btn-search" style="margin-top:10px;">
Consultar
</button>

<div id="search-results" style="margin-top:20px;"></div>
    
</div>

</div>

<script>

const API_BASE =
    window.location.hostname.includes("dev")
        ? "https://kivor-dev.onrender.com"
        : "https://kivor.onrender.com";

# let lastGeneratedLink = null;
lastGeneratedLink = `${window.location.origin}/cx.html?token=${data.token}`;

const btnGenerate = document.getElementById("btn-generate");
const btnCopy = document.getElementById("btn-copy");
const resultBox = document.getElementById("result");
const message = document.getElementById("message");
const btnSearch = document.getElementById("btn-search");
const searchResults = document.getElementById("search-results");
const searchMobile = document.getElementById("search-mobile");


async function copiarAlPortapapeles(texto){

    try{

        await navigator.clipboard.writeText(texto);

        message.style.display = "block";

        setTimeout(()=>{
            message.style.display = "none";
        },2000);

    }catch(e){
        console.error("No se pudo copiar",e);
    }

}

btnGenerate.onclick = async () => {

    const token = sessionStorage.getItem("access_token");

    const response = await fetch(`${API_BASE}/customers-express/generate`,{
        method:"POST",
        headers:{
            "Authorization":`Bearer ${token}`
        }
    });

    const data = await response.json();
    

    lastGeneratedLink = data.link;

    resultBox.style.display = "block";
    resultBox.innerText = lastGeneratedLink;

    btnCopy.style.display = "block";

    copiarAlPortapapeles(lastGeneratedLink);

};

btnCopy.onclick = () => {

    if(!lastGeneratedLink) return;

    copiarAlPortapapeles(lastGeneratedLink);

};
btnSearch.onclick = async () => {

    const mobile = searchMobile.value.trim();

    if(!mobile){
        alert("Ingrese el celular de la clienta");
        return;
    }

    const token = sessionStorage.getItem("access_token");

    try{

        const response = await fetch(
            `${API_BASE}/customers-express/by-mobile/${encodeURIComponent(mobile)}`,
            {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        console.log("FIELDS:", data.fields);
        console.log("RESULTS:", data.results);
        renderSearchResults(data.results, data.fields);

    }catch(e){

        console.error(e);
        alert("Error consultando datos");

    }

};
function renderSearchResults(results, fields){

    if(!results || results.length === 0){

        searchResults.innerHTML = "<p>No se encontraron registros</p>";
        return;

    }

    let html = `
    <div style="overflow-x:auto; width:100%;">
    <table style="width:100%;border-collapse:collapse;font-size:14px; min-width:600px;">
        <thead>
            <tr style="background:#f3f4f6;">
                <th style="padding:8px;text-align:left;">Fecha</th>
    `;

    (fields || []).forEach(f => {

        html += `<th style="padding:8px;text-align:left;">${f}</th>`;

    });

    html += `
                <th style="padding:8px;text-align:left;"></th>
            </tr>
        </thead>
        <tbody>
    `;

    results.forEach((r)=>{
        const firstName = r.customers_express_first_name || "";
        const lastName = r.customers_express_last_name || "";
        const fullName = `${firstName} ${lastName}`.trim();
        const identifier = r.customers_express_identifier_value || "";
        let copyText = "";
        if(identifier && fullName){
            copyText = `${identifier} / ${fullName}`;
        }else if(identifier){
            copyText = identifier;
        }else{
            copyText = fullName;
        }

        html += `
            <tr style="border-bottom:1px solid #eee;">
                <td style="padding:8px; white-space:nowrap;">
                    ${new Date(r.customers_express_completed_at).toLocaleString("es-CL")}
                </td>
        `;

        (fields || []).forEach(f => {
       
            const column = `customers_express_${f.replace("customers_", "")}`;

            html += `
                <td style="padding:8px;">
                    ${r[column] || ""}
                </td>
            `;

        });

        html += `
                <td style="padding:8px;">
                    <button onclick="copyRow('${copyText}')">
                        Copiar
                    </button>
                </td>
            </tr>
        `;
    });

    html += `
        </tbody>
    </table>
    </div>
    `;

    searchResults.innerHTML = html;

}

async function copyRow(text){

    try{

        await navigator.clipboard.writeText(text);

        alert("Copiado al portapapeles:\n\n" + text);

    }catch(e){

        console.error(e);
        alert("No se pudo copiar al portapapeles");

    }

}

    

</script>

</body>
</html>
